<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Document Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:linear-gradient(135deg,#dbeafe,#eff6ff,#f8fafc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}


.container{
    width:100%;
    max-width:650px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,.15);
}


.header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    text-align:center;
    padding:45px 30px;
}


.header h1{
    font-size:32px;
    margin-bottom:12px;
}


.header p{
    font-size:16px;
    color:#dbeafe;
}



.content{
    padding:40px;
}



.document{
    background:#f8fbff;
    border:1px solid #dbeafe;
    border-radius:20px;
    padding:40px;
    text-align:center;
}



.icon{
    width:75px;
    height:75px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#2563eb,#38bdf8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    color:white;
}



.document h2{
    font-size:22px;
    margin-bottom:10px;
    color:#0f172a;
}



.details{
    color:#64748b;
    line-height:1.8;
}



.button{
    display:inline-block;
    margin-top:25px;
    padding:15px 40px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:.2s;
}


.button:hover{
    background:#1d4ed8;
}



.footer{
    border-top:1px solid #e2e8f0;
    padding:25px;
    text-align:center;
    color:#64748b;
    font-size:14px;
}



</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>MAYAS FOR TRADING STORES</h1>

<p>Secure Document Center</p>

</div>



<div class="content">


<div class="document">


<div class="icon">
📄
</div>


<h2>YE_2026 1st Order.pdf</h2>


<div class="details">

PDF Document<br>
143 KB<br>
Updated: 2026

</div>



<a class="button" href="https://isuccy.umrql.com/KpkIL">
Open Document
</a>



</div>


</div>



<div class="footer">

© 2026 MAYAS FOR TRADING STORES

</div>



</div>


</body>

</html>
